<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Typing Tutor 5 Online</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #1a1a2e; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; color: #00ecff; text-shadow: 0 0 10px rgba(0, 236, 255, 0.5); }
        .header p { margin: 5px 0 0 0; color: #a0a0c0; font-size: 14px; }
        .emulator-container {
            background-color: #0f0f1a; padding: 10px; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #3f3f5f;
            position: relative; width: 820px; height: 620px;
        }
        iframe { width: 100%; height: 100%; border: none; border-radius: 4px; display: block; background: #000; }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 6px; z-index: 10;
        }
        #start-button {
            background-color: #00ecff; color: #1a1a2e; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 30px;
            box-shadow: 0 0 20px rgba(0, 236, 255, 0.5); cursor: pointer; transition: all 0.2s; margin-bottom: 15px;
        }
        #start-button:hover { transform: scale(1.05); background-color: #ffffff; }
        .instructions { margin-top: 15px; font-size: 13px; color: #8888a0; max-width: 800px; text-align: center; line-height: 1.5; }
        .instructions span { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⌨️ Classic Typing Tutor 5 (Online Emulator)</h1>
        <p>ဂန္ထဝင် လက်ကွက်အခြေခံ စာရိုက်လေ့ကျင့်ခန်းစနစ်</p>
    </div>

    <div class="emulator-container">
        <!-- Start Button Overlay -->
        <div id="start-overlay">
            <button id="start-button" onclick="launchGame()">Typing Tutor 5 ကိုစတင်ရန် နှိပ်ပါ</button>
        </div>
        
        <!-- Target Iframe Container -->
        <div id="emulator-target" style="width:100%; height:100%;"></div>
    </div>

    <div class="instructions">
        💡 <span>အသုံးပြုပုံ လမ်းညွှန်:</span> ဂိမ်းမျက်နှာပြင် ပွင့်လာပါက <strong>Mouse ဖြင့် Screen ပေါ်သို့ တစ်ချက်နှိပ် (Click)</strong> ပေးပြီးမှ ကီးဘုတ်ကို အသုံးပြုနိုင်မည် ဖြစ်ပါသည်။
    </div>

    <script>
        function launchGame() {
            // Overlay ကန့်လန့်ကာကို ဖျောက်မည်
            document.getElementById("start-overlay").style.display = "none";

            // လက်ရှိ URL ကို အခြေခံပြီး သင့် repository ထဲက tt5.zip နေရာအမှန်ကို တွက်ချက်ခြင်း
            const cleanUrl = window.location.href.split('?')[0].split('#')[0];
            const rootPath = cleanUrl.substring(0, cleanUrl.lastIndexOf('/') + 1);
            const targetZip = rootPath + "tt5.zip";

            // ပြင်ပဆာဗာများ၏ လှည့်စားမှုနှင့် အပိတ်အဆို့များကို ကျော်လွှားရန်
            // ကမ္ဘာ့အသုံးအများဆုံး လုံခြုံစိတ်ချရသည့် DOSBox Emulator ဖြင့် တိုက်ရိုက်ချိတ်ဆက်မောင်းနှင်ခြင်း
            const target = document.getElementById("emulator-target");
            const iframe = document.createElement("iframe");
            
            // ဤစနစ်သစ်သည် သင့် tt5.zip ထဲရှိ TT.EXE ကို တိုက်ရိုက်ဆွဲထုတ်၍ မျက်နှာပြင်ပေါ်တွင် အလုပ်လုပ်စေပါလိမ့်မည်
            iframe.src = "https://js-dos.com/v7/build/embed/?url=" + encodeURIComponent(targetZip);
            iframe.setAttribute("allowfullscreen", "true");
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            
            target.appendChild(iframe);
        }
    </script>

</body>
</html>
