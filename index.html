<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Tutor 5 - Finger Position Lesson</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #1a1a2e; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 26px; color: #00ecff; text-shadow: 0 0 10px rgba(0, 236, 255, 0.5); }
        .header p { margin: 5px 0 0 0; color: #a0a0c0; font-size: 14px; }
        
        .container {
            background-color: #0f0f1a; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #3f3f5f;
            width: 850px; text-align: center;
        }

        /* စာရိုက်ရန်ပြသသည့်နေရာ */
        .text-display {
            background-color: #161625; padding: 20px; border-radius: 8px;
            font-size: 28px; font-family: 'Courier New', Courier, monospace;
            letter-spacing: 4px; margin-bottom: 25px; border: 1px solid #2a2a40;
            min-height: 80px; display: flex; justify-content: center; align-items: center;
        }
        .correct { color: #00ff88; text-shadow: 0 0 5px rgba(0,255,136,0.5); }
        .current { background-color: #00ecff; color: #1a1a2e; border-radius: 4px; padding: 0 4px; }
        
        /* ကီးဘုတ်ပုံစံ */
        .keyboard { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 25px; }
        .row { display: flex; gap: 6px; }
        .key {
            width: 50px; height: 50px; background-color: #252538; border: 1px solid #444460;
            border-radius: 6px; display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 16px; color: #c0c0d0; transition: all 0.1s;
        }
        .key.space { width: 300px; }
        
        /* လက်ချောင်းလမ်းညွှန်ချက် အရောင်များ */
        .highlight-key {
            background-color: #00ecff !important; color: #1a1a2e !important;
            transform: scale(1.05); box-shadow: 0 0 15px #00ecff;
        }

        /* လမ်းညွှန်ချက်စာသား */
        .finger-guide {
            background-color: #1a1a2e; padding: 12px; border-radius: 6px;
            font-size: 16px; color: #ffaa00; font-weight: bold; border-left: 4px solid #ffaa00;
            margin-bottom: 15px;
        }

        .stats { display: flex; justify-content: space-around; font-size: 16px; color: #a0a0c0; }
        .stats span strong { color: #00ecff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⌨️ Classic Typing Tutor 5</h1>
        <p>Lesson 1: Home Row Finger Position (အခြေခံ လက်ကွက်နေရာချထားမှု)</p>
    </div>

    <div class="container">
        <!-- လက်ချောင်းလမ်းညွှန် -->
        <div class="finger-guide" id="guide-text">ညာဘက်လက်ညှိုးဖြင့် 'J' ကို ရိုက်ပါ။</div>

        <!-- စာသားပြကွက် -->
        <div class="text-display" id="text-display"></div>

        <!-- On-Screen Keyboard -->
        <div class="keyboard">
            <div class="row">
                <div class="key" id="key-A">A</div><div class="key" id="key-S">S</div>
                <div class="key" id="key-D">D</div><div class="key" id="key-F">F</div>
                <div class="key" id="key-J">J</div><div class="key" id="key-K">K</div>
                <div class="key" id="key-L">L</div><div class="key" id="key-Semicolon">;</div>
            </div>
            <div class="row">
                <div class="key space" id="key-Space">Spacebar</div>
            </div>
        </div>

        <!-- မှတ်တမ်းများ -->
        <div class="stats">
            <span>ရိုက်ပြီးလုံးရေ: <strong id="score">0</strong></span>
            <span>မှားယွင်းမှု: <strong id="errors">0</strong></span>
            <span>တိကျမှု: <strong id="accuracy">100%</strong></span>
        </div>
    </div>

    <script>
        // Typing Tutor 5 ပုံစံ Home Row လေ့ကျင့်ခန်းစာသားတွဲ
        const lessonText = "asdf jkl; asdf jkl; a s d f j k l ; ff jj dd kk ss ll aa ;; asdfjkl;";
        let currentIndex = 0;
        let errorCount = 0;
        let correctCount = 0;

        // လက်ချောင်း လမ်းညွှန်ချက်များ
        const fingerMapping = {
            'a': 'ဘယ်ဘက်သန်းဗူးတုံး (Pinky Finger) ဖြင့် "A" ကိုရိုက်ပါ။',
            's': 'ဘယ်ဘက်လက်သူကြွယ် (Ring Finger) ဖြင့် "S" ကိုရိုက်ပါ။',
            'd': 'ဘယ်ဘက်လက်ခလယ် (Middle Finger) ဖြင့် "D" ကိုရိုက်ပါ။',
            'f': 'ဘယ်ဘက်လက်ညှိုး (Index Finger) ဖြင့် "F" ကိုရိုက်ပါ။',
            'j': 'ညာဘက်လက်ညှိုး (Index Finger) ဖြင့် "J" ကိုရိုက်ပါ။',
            'k': 'ညာဘက်လက်ခလယ် (Middle Finger) ဖြင့် "K" ကိုရိုက်ပါ။',
            'l': 'ညာဘက်လက်သူကြွယ် (Ring Finger) ဖြင့် "L" ကိုရိုက်ပါ။',
            ';': 'ညာဘက်သန်းဗူးတုံး (Pinky Finger) ဖြင့် ";" ကိုရိုက်ပါ။',
            ' ': 'လက်မ (Thumb) ဖြင့် "Spacebar" ကို နှိပ်ပါ။'
        };

        const displayElement = document.getElementById('text-display');
        const guideElement = document.getElementById('guide-text');

        function updateDisplay() {
            let html = '';
            for (let i = 0; i < lessonText.length; i++) {
                if (i < currentIndex) {
                    html += `<span class="correct">${lessonText[i]}</span>`;
                } else if (i === currentIndex) {
                    html += `<span class="current">${lessonText[i] === ' ' ? '&nbsp;' : lessonText[i]}</span>`;
                } else {
                    html += `<span>${lessonText[i]}</span>`;
                }
            }
            displayElement.innerHTML = html;

            // လမ်းညွှန်စာသားနှင့် Keyboard မီးမောင်းထိုးမှုကို Update လုပ်ခြင်း
            const currentLetter = lessonText[currentIndex];
            if (currentLetter) {
                guideElement.innerText = fingerMapping[currentLetter] || 'ရိုက်ပါ။';
                highlightKey(currentLetter);
            } else {
                guideElement.innerText = "🎉 လေ့ကျင့်ခန်း ပြီးဆုံးပါပြီ။ တော်လိုက်တာဗျာ!";
                removeHighlights();
            }
        }

        function highlightKey(letter) {
            removeHighlights();
            let keyId = 'key-';
            if (letter === ' ') keyId += 'Space';
            else if (letter === ';') keyId += 'Semicolon';
            else keyId += letter.toUpperCase();

            const keyEl = document.getElementById(keyId);
            if (keyEl) keyEl.classList.add('highlight-key');
        }

        function removeHighlights() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight-key'));
        }

        // ကီးဘုတ်ရိုက်ချက်ကို ဖမ်းယူခြင်း
        window.addEventListener('keydown', (e) => {
            if (currentIndex >= lessonText.length) return;

            let pressedKey = e.key;
            const targetKey = lessonText[currentIndex];

            // စာလုံးအသေးအကြီး ညှိခြင်း
            if (pressedKey === 'Spacebar') pressedKey = ' ';

            if (pressedKey === targetKey) {
                correctCount++;
                currentIndex++;
                document.getElementById('score').innerText = currentIndex;
            } else {
                // Shift key ကဲ့သို့ function key များကို မှားသည်ဟု မသတ်မှတ်ရန်
                if(pressedKey.length === 1) {
                    errorCount++;
                    document.getElementById('errors').innerText = errorCount;
                }
            }

            // တိကျမှုတွက်ချက်ခြင်း
            const total = correctCount + errorCount;
            if (total > 0) {
                const acc = Math.round((correctCount / total) * 100);
                document.getElementById('accuracy').innerText = acc + '%';
            }

            updateDisplay();
        });

        // ပထမဆုံးအကြိမ် စတင်ပွင့်ချိန်
        updateDisplay();
    </script>
</body>
</html>
